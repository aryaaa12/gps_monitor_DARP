<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0b0f14;
  --surface: #121821;
  --surface2: #1a2330;

  --border: rgba(255,255,255,0.06);
  --border-bright: rgba(255,255,255,0.12);

  --accent: #d1d5db;
  --accent2: #9ca3af;

  --green: #7dd3a7;
  --amber: #d6b46b;
  --red: #d88b8b;
  --purple: #b4b3ff;
  --teal: #7cc7c4;

  --text: #f3f4f6;
  --muted: #94a3b8;

  --font-display: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-display);
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top right, rgba(255,255,255,0.04), transparent 35%),
    radial-gradient(circle at bottom left, rgba(255,255,255,0.03), transparent 30%);
  pointer-events:none;
  z-index:0;
}

.container{
  position:relative;
  z-index:1;
  max-width:1100px;
  margin:0 auto;
  padding:24px 16px 48px;
}

header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:32px;
  flex-wrap:wrap;
  gap:12px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.brand-icon{
  width:44px;
  height:44px;
  border-radius:12px;
  background:linear-gradient(135deg,#2b3442,#1f2937);
  display:flex;
  align-items:center;
  justify-content:center;
}

.brand-title{
  font-size:20px;
  font-weight:700;
  letter-spacing:-0.5px;
}

.brand-sub{
  font-size:11px;
  color:var(--muted);
  font-family:var(--font-mono);
  letter-spacing:1px;
  text-transform:uppercase;
  margin-top:2px;
}

.live-badge{
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:999px;
  padding:6px 14px;
  font-family:var(--font-mono);
  font-size:12px;
  color:var(--green);
}

.live-dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--green);
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%,100%{
    opacity:1;
    transform:scale(1);
  }
  50%{
    opacity:0.5;
    transform:scale(0.8);
  }
}

.nav-tabs{
  display:flex;
  gap:4px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:4px;
  margin-bottom:28px;
}

.tab-btn{
  flex:1;
  padding:10px 16px;
  border-radius:10px;
  border:none;
  background:transparent;
  color:var(--muted);
  font-family:var(--font-display);
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
}

.tab-btn.active{
  background:var(--surface2);
  color:var(--text);
  border:1px solid var(--border-bright);
}

.panel{
  display:none;
}

.panel.active{
  display:block;
}

.dashboard-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-bottom:20px;
}

.metric-card{
  background:rgba(18,24,33,0.85);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px 16px;
  position:relative;
  overflow:hidden;
  transition:0.25s;
  backdrop-filter:blur(12px);
  box-shadow:0 8px 30px rgba(0,0,0,0.25);
}

.metric-card:hover{
  transform:translateY(-2px);
  border-color:var(--border-bright);
}

.metric-card::before{
  content:'';
  position:absolute;
  top:-30px;
  right:-30px;
  width:80px;
  height:80px;
  border-radius:50%;
  opacity:0.03;
  background:white;
}

.metric-label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:1.2px;
  color:var(--muted);
  font-family:var(--font-mono);
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:6px;
}

.metric-icon{
  width:14px;
  height:14px;
  opacity:0.7;
}

.metric-value{
  font-size:22px;
  font-weight:700;
  line-height:1;
  letter-spacing:-0.5px;
  color:var(--text);
}

.metric-unit{
  font-size:12px;
  font-weight:400;
  color:var(--muted);
  margin-left:4px;
}

.status-card{
  grid-column:1 / -1;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:12px;
  padding:16px 20px;
}

.status-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.status-indicator{
  width:12px;
  height:12px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 12px rgba(125,211,167,0.4);
}

.coord-card{
  background:rgba(18,24,33,0.85);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px 20px;
  display:flex;
  gap:24px;
  flex-wrap:wrap;
  align-items:center;
  backdrop-filter:blur(12px);
}

.coord-value{
  font-family:var(--font-mono);
  font-size:18px;
  font-weight:600;
  color:var(--text);
}

.map-container{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  border:1px solid var(--border);
}

#map{
  height:480px;
  width:100%;
  background:#0f1722;
}

.ctrl-btn{
  padding:8px 16px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(18,24,33,0.9);
  color:var(--muted);
  font-family:var(--font-mono);
  font-size:12px;
  cursor:pointer;
  transition:0.2s;
}

.ctrl-btn:hover,
.ctrl-btn.active{
  background:var(--surface2);
  color:var(--text);
  border-color:var(--border-bright);
}

.custom-marker{
  width:28px;
  height:28px;
  border-radius:50%;
  background:#d1d5db;
  border:3px solid #0b0f14;
  box-shadow:0 0 18px rgba(255,255,255,0.2);
}

.leaflet-tile-pane{
  filter:brightness(0.55) saturate(0.4) contrast(1.1);
}

.leaflet-control-zoom a{
  background:var(--surface)!important;
  color:white!important;
  border-color:var(--border)!important;
}

.leaflet-popup-content-wrapper{
  background:var(--surface)!important;
  color:var(--text)!important;
  border:1px solid var(--border-bright)!important;
  border-radius:12px!important;
  font-family:var(--font-mono)!important;
}

@media(max-width:640px){
  .dashboard-grid{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:430px){
  .dashboard-grid{
    grid-template-columns:1fr;
  }

  .tab-btn{
    font-size:11px;
    padding:8px 10px;
  }
}
</style>
